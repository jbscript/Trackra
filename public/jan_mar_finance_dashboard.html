
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: var(--font-sans); }
.dash { padding: 1rem 0; }
.month-tabs { display: flex; gap: 8px; margin-bottom: 1.25rem; }
.tab { padding: 6px 18px; border-radius: var(--border-radius-md); border: 0.5px solid var(--color-border-secondary); background: transparent; color: var(--color-text-secondary); cursor: pointer; font-size: 14px; font-family: var(--font-sans); }
.tab.active { background: var(--color-text-primary); color: var(--color-background-primary); border-color: var(--color-text-primary); }
.metrics { display: grid; grid-template-columns: repeat(4, minmax(0,1fr)); gap: 10px; margin-bottom: 1.25rem; }
.metric { background: var(--color-background-secondary); border-radius: var(--border-radius-md); padding: 0.85rem 1rem; }
.metric-label { font-size: 12px; color: var(--color-text-secondary); margin-bottom: 4px; }
.metric-val { font-size: 20px; font-weight: 500; color: var(--color-text-primary); }
.metric-val.green { color: #1D9E75; }
.metric-val.red { color: #D85A30; }
.metric-val.blue { color: #378ADD; }
.charts-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 1.25rem; }
.card { background: var(--color-background-primary); border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-lg); padding: 1rem 1.25rem; }
.card-title { font-size: 13px; font-weight: 500; color: var(--color-text-secondary); margin-bottom: 12px; }
.legend { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 10px; }
.leg-item { display: flex; align-items: center; gap: 5px; font-size: 11px; color: var(--color-text-secondary); }
.leg-dot { width: 8px; height: 8px; border-radius: 2px; flex-shrink: 0; }
.top-cats { display: flex; flex-direction: column; gap: 8px; }
.cat-row { display: flex; align-items: center; gap: 10px; }
.cat-name { font-size: 13px; color: var(--color-text-primary); min-width: 110px; }
.cat-bar-wrap { flex: 1; height: 8px; background: var(--color-background-secondary); border-radius: 4px; overflow: hidden; }
.cat-bar { height: 100%; border-radius: 4px; }
.cat-amt { font-size: 12px; color: var(--color-text-secondary); min-width: 60px; text-align: right; }
</style>

<div class="dash">
  <div class="month-tabs" id="tabs"></div>
  <div class="metrics" id="metrics"></div>
  <div class="charts-row">
    <div class="card">
      <div class="card-title">spending by category</div>
      <div class="legend" id="legend1"></div>
      <div style="position:relative;height:220px;"><canvas id="chart1"></canvas></div>
    </div>
    <div class="card">
      <div class="card-title">income vs expenses vs investments</div>
      <div class="legend" id="legend2"></div>
      <div style="position:relative;height:220px;"><canvas id="chart2"></canvas></div>
    </div>
  </div>
  <div class="card">
    <div class="card-title">top expense categories</div>
    <div class="top-cats" id="topCats"></div>
  </div>
</div>

const months = ['Jan','Feb','Mar','All'];
const catColors = {
  'Dining':'#3266ad','Groceries':'#1D9E75','Rent':'#D85A30','Shopping':'#9370db',
  'Transport':'#e8a838','EMI':'#e05d72','Family Support':'#5b8c5a','Insurance':'#b0505a',
  'Utilities':'#5b9ab5','Entertainment':'#c96f2d','Gifts':'#c44d8f','Investment':'#378ADD',
  'Misc':'#888780','Household':'#7a6b4b','Personal Care':'#c06090','Health':'#2bba8f',
  'Other':'#b0b0a0'
};

function getColor(cat){ return catColors[cat] || catColors['Other']; }

function compute(month) {
  const data = month==='All' ? raw : raw.filter(r=>r.month===month);
  let income=0, expense=0, invest=0;
  const cats={};
  data.forEach(r=>{
    const a=parseInt(r.amount);
    if(r.type==='Income') income+=a;
    else if(r.type==='Transfer') invest+=a;
    else if(r.type==='Expense'){
      expense+=a;
      cats[r.category]=(cats[r.category]||0)+a;
    }
  });
  return {income,expense,invest,cats,savings:income-expense-invest};
}

let activeMonth = 'Jan';

function fmt(n){ return '₹'+Math.round(n).toLocaleString('en-IN'); }

  const {income,expense,invest,cats,savings} = compute(month);

  document.getElementById('metrics').innerHTML = `
    <div class="metric"><div class="metric-label">total income</div><div class="metric-val green">${fmt(income)}</div></div>
    <div class="metric"><div class="metric-label">total expenses</div><div class="metric-val red">${fmt(expense)}</div></div>
    <div class="metric"><div class="metric-label">invested</div><div class="metric-val blue">${fmt(invest)}</div></div>
    <div class="metric"><div class="metric-label">net savings</div><div class="metric-val ${savings>=0?'green':'red'}">${fmt(savings)}</div></div>`;

  const sortedCats = Object.entries(cats).sort((a,b)=>b[1]-a[1]);
  const top8 = sortedCats.slice(0,8);
  const labels = top8.map(c=>c[0]);
  const vals = top8.map(c=>c[1]);
  const colors = labels.map(getColor);

  document.getElementById('legend1').innerHTML = top8.map(([cat,v])=>
    `<span class="leg-item"><span class="leg-dot" style="background:${getColor(cat)}"></span>${cat}</span>`).join('');

  if(chart1Inst) chart1Inst.destroy();
  chart1Inst = new Chart(document.getElementById('chart1'),{
    type:'doughnut',
    data:{labels,datasets:[{data:vals,backgroundColor:colors,borderWidth:1,borderColor:'rgba(255,255,255,0.2)'}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:(c)=>`${c.label}: ${fmt(c.raw)}`}}}}
  });

  const m3 = ['Jan','Feb','Mar'];
  const incArr=m3.map(m=>compute(m).income);
  const expArr=m3.map(m=>compute(m).expense);
  const invArr=m3.map(m=>compute(m).invest);

  document.getElementById('legend2').innerHTML = [
    ['Income','#1D9E75'],['Expenses','#D85A30'],['Invested','#378ADD']
  ].map(([l,c])=>`<span class="leg-item"><span class="leg-dot" style="background:${c}"></span>${l}</span>`).join('');

  if(chart2Inst) chart2Inst.destroy();
  chart2Inst = new Chart(document.getElementById('chart2'),{
    type:'bar',
    data:{labels:m3,datasets:[
      {label:'Income',data:incArr,backgroundColor:'#1D9E75',borderRadius:3},
      {label:'Expenses',data:expArr,backgroundColor:'#D85A30',borderRadius:3},
      {label:'Invested',data:invArr,backgroundColor:'#378ADD',borderRadius:3}
    ]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:(c)=>`${c.dataset.label}: ${fmt(c.raw)}`}}},scales:{x:{grid:{display:false},ticks:{color:'#888'}},y:{grid:{color:'rgba(128,128,128,0.1)'},ticks:{color:'#888',callback:(v)=>'₹'+Math.round(v/1000)+'k'}}}}
  });

  const maxCat = sortedCats[0]?.[1]||1;
  document.getElementById('topCats').innerHTML = sortedCats.slice(0,8).map(([cat,amt])=>`
    <div class="cat-row">
      <div class="cat-name">${cat}</div>
      <div class="cat-bar-wrap"><div class="cat-bar" style="width:${Math.round(amt/maxCat*100)}%;background:${getColor(cat)}"></div></div>
      <div class="cat-amt">${fmt(amt)}</div>
    </div>`).join('');
}

const tabsEl = document.getElementById('tabs');
months.forEach(m=>{
  const b=document.createElement('button');
  b.className='tab'; b.dataset.m=m; b.textContent=m;
  b.onclick=()=>render(m);
  tabsEl.appendChild(b);
});
render('Jan');
</script>
